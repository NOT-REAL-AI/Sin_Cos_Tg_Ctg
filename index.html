<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>АУРА · ТРИГОНОМЕТРИЯ · ТОЧНЫЕ ЗНАЧЕНИЯ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Montserrat', system-ui, sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0b0d1e, #020108);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 80vw;
      height: 80vw;
      max-width: 900px;
      max-height: 900px;
      background: radial-gradient(circle, rgba(255, 0, 150, 0.25) 0%, rgba(0, 200, 255, 0.15) 50%, transparent 80%);
      filter: blur(120px);
      top: -10%;
      left: -10%;
      z-index: 0;
      animation: auraFloat1 16s infinite alternate ease-in-out;
    }

    body::after {
      content: "";
      position: absolute;
      width: 70vw;
      height: 70vw;
      max-width: 800px;
      max-height: 800px;
      background: radial-gradient(circle, rgba(0, 255, 200, 0.2) 0%, rgba(150, 0, 255, 0.25) 60%, transparent 90%);
      filter: blur(130px);
      bottom: -5%;
      right: -5%;
      z-index: 0;
      animation: auraFloat2 20s infinite alternate ease-in-out;
    }

    @keyframes auraFloat1 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.7; }
      100% { transform: translate(8%, 6%) scale(1.2); opacity: 1; }
    }
    @keyframes auraFloat2 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
      100% { transform: translate(-5%, -8%) scale(1.3); opacity: 0.9; }
    }

    .calculator {
      position: relative;
      z-index: 10;
      max-width: 900px;
      width: 100%;
      background: rgba(5, 7, 19, 0.65);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(255, 215, 255, 0.25);
      border-radius: 48px;
      padding: 30px 28px 36px;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 255, 255, 0.1) inset, 0 0 30px rgba(180, 0, 255, 0.3);
      transition: box-shadow 0.3s;
    }

    .calculator:hover {
      box-shadow: 0 30px 60px -5px black, 0 0 0 1.5px rgba(210, 180, 255, 0.4) inset, 0 0 50px #a05eff55;
    }

    .title-block {
      text-align: center;
      margin-bottom: 32px;
    }

    .glow-title {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      background: linear-gradient(135deg, #ffe99c, #ffd0b0, #c5b4ff, #9eeafb, #b0ffcf);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px #ff66c0, 0 0 35px #4ad0ff;
      filter: drop-shadow(0 4px 6px #00000050);
      word-break: break-word;
    }

    .subaura {
      color: #cdd9ff;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 8px;
      font-size: 0.9rem;
      margin-top: 6px;
      text-shadow: 0 0 10px cyan;
      opacity: 0.9;
    }

    .selector-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px 18px;
      margin-bottom: 28px;
      justify-content: center;
    }

    .select-wrapper {
      flex: 1 1 200px;
      min-width: 170px;
    }

    .label-icon {
      display: block;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b7c9ff;
      margin-bottom: 8px;
      text-shadow: 0 0 8px #00c8ff;
    }

    .neo-select, .neo-input {
      width: 100%;
      background: rgba(12, 15, 30, 0.8);
      border: 1.5px solid rgba(150, 200, 255, 0.5);
      border-radius: 40px;
      padding: 14px 20px;
      font-size: 1.2rem;
      font-weight: 600;
      color: #f0f4ff;
      backdrop-filter: blur(8px);
      box-shadow: 0 6px 12px #00000030, 0 0 10px #3f9eff33 inset;
      transition: all 0.2s;
      outline: none;
      cursor: pointer;
    }

    .neo-input {
      cursor: text;
    }

    .neo-select option {
      background: #0f1225;
      color: #eef3ff;
      font-weight: 500;
    }

    .neo-select:hover, .neo-input:hover {
      border-color: #b77eff;
      box-shadow: 0 0 18px #a570ff, 0 6px 12px #000;
    }

    .neo-select:focus, .neo-input:focus {
      border-color: #ffb0f0;
      box-shadow: 0 0 24px #ff96e0, 0 0 8px #b8a2ff inset;
    }

    /* Конструктор значения */
    .value-constructor {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 48px;
      padding: 20px 18px;
      margin-bottom: 20px;
      border: 1px solid #4f5a9e66;
    }

    .expression-builder {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 15px;
    }

    .expr-part {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(20, 25, 50, 0.6);
      padding: 5px 15px;
      border-radius: 40px;
      border: 1px solid #5f73b0;
    }

    .expr-input {
      width: 100px;
      background: transparent;
      border: none;
      padding: 10px 5px;
      font-size: 1.3rem;
      color: #ffffff;
      text-align: center;
      outline: none;
      font-weight: 600;
    }

    .expr-input::placeholder {
      color: #7a89c2;
      font-size: 1rem;
    }

    .expr-label {
      color: #b7cbff;
      font-size: 1.4rem;
      font-weight: 600;
    }

    .pi-btn {
      background: #2a3366;
      border: 1.5px solid #8f9eff;
      color: white;
      padding: 12px 22px;
      border-radius: 40px;
      font-size: 1.4rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s;
      box-shadow: 0 0 15px #3f6eff;
    }

    .pi-btn.active {
      background: #6d4aff;
      border-color: #ffdb9e;
      box-shadow: 0 0 25px #b77aff;
    }

    .help-text {
      margin-top: 12px;
      color: #9aaddd;
      font-size: 0.9rem;
    }

    .quarter-section {
      margin: 20px 0 26px;
    }

    .quarter-title {
      color: #c6d0ff;
      margin-bottom: 16px;
      font-size: 1.2rem;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-shadow: 0 0 8px magenta;
    }

    .quarter-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .quarter-btn {
      background: rgba(20, 20, 45, 0.7);
      backdrop-filter: blur(8px);
      border: 1.5px solid #4f5a9e;
      border-radius: 60px;
      padding: 16px 5px;
      font-size: 1.6rem;
      font-weight: 800;
      color: #e1e6ff;
      text-shadow: 0 0 10px #80c0ff;
      box-shadow: 0 8px 0 #0a0c1a, 0 4px 18px #00000080, 0 0 12px #3f7bff55 inset;
      transition: all 0.15s;
      cursor: pointer;
      text-align: center;
      letter-spacing: 2px;
    }

    .quarter-btn.active {
      background: linear-gradient(145deg, #4343b0, #1f1f66);
      border-color: #ffdb9e;
      box-shadow: 0 0 25px #fa9eff, 0 0 12px #00ffff, 0 4px 0 #191c30;
      color: white;
      transform: scale(1.02);
      text-shadow: 0 0 20px white;
    }

    .calc-btn {
      width: 100%;
      background: linear-gradient(135deg, #ae6eff, #3a86ff);
      border: none;
      border-radius: 60px;
      padding: 18px 10px;
      font-size: 1.8rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 8px;
      color: #ffffff;
      text-shadow: 0 2px 10px black;
      box-shadow: 0 16px 0 #1a1e3a, 0 8px 30px #000000b0, 0 0 30px #be7cff;
      margin: 16px 0 24px;
      cursor: pointer;
      transition: 0.08s linear;
      border: 1px solid #ffd0f0aa;
    }

    .calc-btn:active {
      transform: translateY(8px);
      box-shadow: 0 8px 0 #12162e, 0 8px 25px #000, 0 0 40px #ffa0e0;
    }

    .results-panel {
      background: rgba(0, 5, 20, 0.5);
      backdrop-filter: blur(8px);
      border-radius: 40px;
      padding: 24px 22px;
      border: 1px solid rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 30px #001aff1a, inset 0 0 15px #3e3eb0;
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 18px 22px;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1.5px dashed #5d71b9;
      padding-bottom: 8px;
    }

    .func-name {
      font-size: 1.7rem;
      font-weight: 700;
      background: linear-gradient(145deg, #ffe6b0, #cbb2ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 15px #fea3ff;
    }

    .func-value {
      font-size: 2rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      color: #ffffff;
      text-shadow: 0 0 20px #3effe6, 0 0 5px black;
      letter-spacing: 2px;
      word-break: break-word;
      text-align: right;
    }

    .error-message {
      color: #ffb0b0;
      background: #2f0033aa;
      border-radius: 30px;
      padding: 10px 18px;
      margin-top: 16px;
      font-weight: 500;
      backdrop-filter: blur(5px);
      border-left: 8px solid #ff5060;
    }

    .info-note {
      color: #adc8ff;
      font-size: 0.9rem;
      margin-top: 12px;
      text-align: right;
      opacity: 0.8;
    }

    .signature {
      margin-top: 28px;
      text-align: center;
      color: #a3abdd;
      font-weight: 300;
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 6px;
    }
  </style>
</head>
<body>

<div class="calculator">
  <div class="title-block">
    <div class="glow-title">⚡ АУРА · ТОЧНОСТЬ ⚡</div>
    <div class="subaura">символьная тригонометрия</div>
  </div>

  <div class="selector-group">
    <div class="select-wrapper">
      <span class="label-icon">🌀 ИЗВЕСТНАЯ ФУНКЦИЯ</span>
      <select id="funcSelect" class="neo-select">
        <option value="sin" selected>sin α · синус</option>
        <option value="cos">cos α · косинус</option>
        <option value="tan">tg α · тангенс</option>
        <option value="cot">ctg α · котангенс</option>
      </select>
    </div>
  </div>

  <!-- НОВЫЙ УДОБНЫЙ ВВОД: дробь, корень, π -->
  <div class="value-constructor">
    <div class="label-icon">💎 ВВЕДИТЕ ВЫРАЖЕНИЕ</div>
    <div class="expression-builder">
      <div class="expr-part">
        <span class="expr-label">√</span>
        <input type="text" id="sqrtInput" class="expr-input" placeholder="число" value="">
      </div>
      <span style="color:#b7cbff; font-size:1.8rem;">·</span>
      <div class="expr-part">
        <input type="text" id="fractionInput" class="expr-input" placeholder="a/b или число" value="1" style="width:120px;">
      </div>
      <div class="pi-btn" id="piToggle">π</div>
    </div>
    <div class="help-text">
      ✦ Примеры: √3 · 1/2 · π  |  √2 · 5/6  |  3/4 · π  |  √2 · 1  |  просто 0.5 ✦
    </div>
  </div>

  <!-- ЧЕТВЕРТЬ -->
  <div class="quarter-section">
    <div class="quarter-title">
      <span>🧿 ЧЕТВЕРТЬ УГЛА α</span>
      <span style="font-size:0.8rem; opacity:0.7;">(I · II · III · IV)</span>
    </div>
    <div class="quarter-grid">
      <div class="quarter-btn active" data-quarter="1">Ⅰ</div>
      <div class="quarter-btn" data-quarter="2">Ⅱ</div>
      <div class="quarter-btn" data-quarter="3">Ⅲ</div>
      <div class="quarter-btn" data-quarter="4">Ⅳ</div>
    </div>
  </div>

  <button class="calc-btn" id="calculateBtn">ВЫЧИСЛИТЬ</button>

  <!-- РЕЗУЛЬТАТЫ -->
  <div class="results-panel">
    <div class="result-grid">
      <div class="result-item"><span class="func-name">sin α</span><span class="func-value" id="resSin">—</span></div>
      <div class="result-item"><span class="func-name">cos α</span><span class="func-value" id="resCos">—</span></div>
      <div class="result-item"><span class="func-name">tg α</span><span class="func-value" id="resTan">—</span></div>
      <div class="result-item"><span class="func-name">ctg α</span><span class="func-value" id="resCot">—</span></div>
    </div>
    <div id="errorMsg" class="error-message"></div>
    <div class="info-note">✦ точные дроби, корни и π ✦</div>
  </div>

  <div class="signature">АУРА · СИМВОЛЬНЫЙ РАСЧЁТ</div>
</div>

<script>
  (function(){
    "use strict";

    const funcSelect = document.getElementById('funcSelect');
    const sqrtInput = document.getElementById('sqrtInput');
    const fractionInput = document.getElementById('fractionInput');
    const piToggle = document.getElementById('piToggle');
    const quarterBtns = document.querySelectorAll('.quarter-btn');
    const calcBtn = document.getElementById('calculateBtn');

    const resSin = document.getElementById('resSin');
    const resCos = document.getElementById('resCos');
    const resTan = document.getElementById('resTan');
    const resCot = document.getElementById('resCot');
    const errorMsgDiv = document.getElementById('errorMsg');

    let currentQuarter = 1;
    let piActive = false;

    // Переключение π
    piToggle.addEventListener('click', () => {
      piActive = !piActive;
      piToggle.classList.toggle('active', piActive);
    });

    function setActiveQuarter(quarter) {
      quarterBtns.forEach(btn => {
        const q = parseInt(btn.getAttribute('data-quarter'), 10);
        btn.classList.toggle('active', q === quarter);
      });
      currentQuarter = quarter;
    }

    quarterBtns.forEach(btn => {
      btn.addEventListener('click', function() {
        setActiveQuarter(parseInt(this.getAttribute('data-quarter'), 10));
      });
    });

    // --- Парсинг дроби (a/b или число) ---
    function parseFraction(str) {
      str = str.trim();
      if (str === '') return 1;
      if (str.includes('/')) {
        let parts = str.split('/');
        if (parts.length !== 2) throw new Error('Дробь должна быть вида a/b');
        let num = parseFloat(parts[0]);
        let den = parseFloat(parts[1]);
        if (isNaN(num) || isNaN(den)) throw new Error('Неверный формат дроби');
        if (den === 0) throw new Error('Деление на ноль');
        return num / den;
      } else {
        let val = parseFloat(str);
        if (isNaN(val)) throw new Error('Введите число или дробь');
        return val;
      }
    }

    // Получение структуры для символьного отображения
    function getSymbolicStructure() {
      let sqrtStr = sqrtInput.value.trim();
      let sqrtNum = null;
      if (sqrtStr !== '') {
        sqrtNum = parseFloat(sqrtStr);
        if (isNaN(sqrtNum) || sqrtNum < 0) throw new Error('Под корнем ≥ 0');
      }
      
      let fracStr = fractionInput.value.trim();
      let coeff = parseFraction(fracStr);
      
      let numericValue = coeff;
      if (sqrtNum !== null) numericValue *= Math.sqrt(sqrtNum);
      if (piActive) numericValue *= Math.PI;
      
      // Сохраняем исходную дробь как строку для красоты
      let fractionDisplay = fracStr;
      if (!fracStr.includes('/') && !isNaN(parseFloat(fracStr))) {
        // если это целое или десятичное — попробуем преобразовать в дробь
        fractionDisplay = toFractionString(coeff);
      }
      
      return { numericValue, sqrtNum, fractionDisplay, hasPi: piActive, coeff };
    }

    // Преобразование числа в строку-дробь
    function toFractionString(x, maxDen = 100) {
      if (Math.abs(x) < 1e-12) return '0';
      const sign = x < 0 ? -1 : 1;
      x = Math.abs(x);
      let bestNum = 1, bestDen = 1, bestDiff = Math.abs(x - 1);
      for (let den = 1; den <= maxDen; den++) {
        let num = Math.round(x * den);
        let diff = Math.abs(x - num / den);
        if (diff < bestDiff) {
          bestDiff = diff;
          bestNum = num;
          bestDen = den;
        }
      }
      const gcd = (a, b) => b ? gcd(b, a % b) : a;
      const div = gcd(bestNum, bestDen);
      bestNum /= div;
      bestDen /= div;
      if (bestDen === 1) return (sign * bestNum).toString();
      return `${sign * bestNum}/${bestDen}`;
    }

    // Форматирование результата
    function formatExact(num, sqrtNum, fractionDisplay, hasPi) {
      if (num === null || !isFinite(num)) {
        if (num === Infinity) return '∞';
        if (num === -Infinity) return '-∞';
        return '—';
      }
      if (!isFinite(num)) return num > 0 ? '∞' : '-∞';
      
      const sign = num < 0 ? -1 : 1;
      const absNum = Math.abs(num);
      if (absNum < 1e-12) return '0';
      
      // Пытаемся восстановить символьный вид
      let rational = absNum;
      let hasSqrt = (sqrtNum !== null);
      let sqrtVal = sqrtNum;
      
      if (hasPi) rational /= Math.PI;
      if (hasSqrt) rational /= Math.sqrt(sqrtNum);
      
      // rational теперь примерно равен исходному coeff
      let fracPart = toFractionString(rational);
      
      let parts = [];
      if (fracPart !== '1' || (!hasSqrt && !hasPi)) {
        parts.push(fracPart);
      }
      if (hasSqrt) {
        parts.push(`√${formatSqrt(sqrtVal)}`);
      }
      if (hasPi) {
        parts.push('π');
      }
      
      let result = parts.join('·');
      if (result === '') result = '1';
      return (sign === -1 ? '-' : '') + result;
    }

    function formatSqrt(n) {
      if (Number.isInteger(n)) return n.toString();
      return n.toFixed(4).replace(/\.?0+$/, '');
    }

    function getSigns(q) {
      if (q === 1) return { sin: 1, cos: 1, tan: 1, cot: 1 };
      if (q === 2) return { sin: 1, cos: -1, tan: -1, cot: -1 };
      if (q === 3) return { sin: -1, cos: -1, tan: 1, cot: 1 };
      return { sin: -1, cos: 1, tan: -1, cot: -1 };
    }

    function computeAll(knownFunc, numVal, quarter) {
      const signs = getSigns(quarter);
      const eps = 1e-12;
      let sin = null, cos = null, tan = null, cot = null;
      
      if (knownFunc === 'sin') {
        sin = numVal;
        if (Math.abs(sin) > 1.000001) throw new Error('|sin| ≤ 1');
        sin = Math.max(-1, Math.min(1, sin));
        const cos2 = 1 - sin*sin;
        if (cos2 < 0) throw new Error('cos² < 0');
        cos = Math.sqrt(cos2) * signs.cos;
        tan = (Math.abs(cos) < eps) ? (sin >= 0 ? Infinity : -Infinity) : sin / cos;
        cot = (Math.abs(sin) < eps) ? (cos >= 0 ? Infinity : -Infinity) : cos / sin;
      } else if (knownFunc === 'cos') {
        cos = numVal;
        if (Math.abs(cos) > 1.000001) throw new Error('|cos| ≤ 1');
        cos = Math.max(-1, Math.min(1, cos));
        const sin2 = 1 - cos*cos;
        if (sin2 < 0) throw new Error('sin² < 0');
        sin = Math.sqrt(sin2) * signs.sin;
        tan = (Math.abs(cos) < eps) ? (sin >= 0 ? Infinity : -Infinity) : sin / cos;
        cot = (Math.abs(sin) < eps) ? (cos >= 0 ? Infinity : -Infinity) : cos / sin;
      } else if (knownFunc === 'tan') {
        tan = numVal;
        if (!isFinite(tan)) throw new Error('tg число');
        const tan2 = tan*tan;
        const cos2 = 1/(1+tan2);
        cos = Math.sqrt(cos2) * signs.cos;
        sin = tan * cos;
        if (Math.abs(sin) > 1) sin = Math.sign(sin);
        cot = (Math.abs(tan) < eps) ? (cos >= 0 ? Infinity : -Infinity) : 1/tan;
      } else {
        cot = numVal;
        if (!isFinite(cot)) throw new Error('ctg число');
        if (Math.abs(cot) < eps) {
          tan = (cot >= 0) ? Infinity : -Infinity;
        } else {
          tan = 1/cot;
        }
        const cot2 = cot*cot;
        const sin2 = 1/(1+cot2);
        sin = Math.sqrt(sin2) * signs.sin;
        cos = sin * cot;
        if (Math.abs(cos) > 1) cos = Math.sign(cos);
      }
      
      return { sin, cos, tan, cot };
    }

    function onCalculate() {
      errorMsgDiv.textContent = '';
      try {
        const parsed = getSymbolicStructure();
        const results = computeAll(funcSelect.value, parsed.numericValue, currentQuarter);
        
        resSin.textContent = formatExact(results.sin, parsed.sqrtNum, parsed.fractionDisplay, parsed.hasPi);
        resCos.textContent = formatExact(results.cos, parsed.sqrtNum, parsed.fractionDisplay, parsed.hasPi);
        resTan.textContent = formatExact(results.tan, parsed.sqrtNum, parsed.fractionDisplay, parsed.hasPi);
        resCot.textContent = formatExact(results.cot, parsed.sqrtNum, parsed.fractionDisplay, parsed.hasPi);
      } catch (e) {
        errorMsgDiv.textContent = e.message;
        resSin.textContent = resCos.textContent = resTan.textContent = resCot.textContent = '—';
      }
    }

    calcBtn.addEventListener('click', onCalculate);
    [sqrtInput, fractionInput].forEach(i => i.addEventListener('keypress', e => { if(e.key==='Enter') onCalculate(); }));
    
    window.addEventListener('DOMContentLoaded', () => {
      setActiveQuarter(1);
      piActive = false;
      piToggle.classList.remove('active');
      onCalculate();
    });
  })();
</script>
</body>
</html>
